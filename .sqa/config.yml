config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/github-samples/pets-workshop:
      branch: main
      repo: https://github.com/github-samples/pets-workshop
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.flimsy-beige-fousek.sh
        container: qc.acc_pasty-scarlet-akbash
  QC.Doc:
    repos:
      github.com/github-samples/pets-workshop find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.flaky-carmine-bullfrog.sh
        container: qc.doc_scaly-carmine-setter
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.ready-razzmatazz-centipede.sh
        container: qc.doc_silly-chestnut-bird
      github.com/github-samples/pets-workshop markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.flimsy-brown-fossa.sh
        container: qc.doc_cozy-cyan-ragdoll
  QC.Lic:
    repos:
      github.com/github-samples/pets-workshop licensee:
        commands:
        - /usr/bin/env sh .sqa/script.grumpy-red-dingo.sh
        container: qc.lic_gloppy-dandelion-bordeaux
  QC.Sec:
    repos:
      github.com/github-samples/pets-workshop bandit:
        commands:
        - /usr/bin/env sh .sqa/script.nippy-pear-otter.sh
        container: qc.sec_pokey-yellow-quoll
  QC.Sty:
    repos:
      github.com/github-samples/pets-workshop flake8:
        commands:
        - /usr/bin/env sh .sqa/script.blurry-gold-toucan.sh
        container: qc.sty_tacky-tangerine-albatross
      github.com/github-samples/pets-workshop hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.tasty-cardinal-zonkey.sh
        container: qc.sty_droopy-orange-sloth
      github.com/github-samples/pets-workshop jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.ugly-pumpkin-urchin.sh
        container: qc.sty_fuzzy-myrtle-shark
  QC.Uni:
    repos:
      github.com/github-samples/pets-workshop pytest:
        commands:
        - /usr/bin/env sh .sqa/script.homey-thistle-mandrill.sh
        container: qc.uni_baggy-mauve-pig
  QC.Ver:
    repos:
      github.com/github-samples/pets-workshop get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.sunny-vermilion-octopus.sh
        container: qc.ver_snippy-sangria-paradise
timeout: 5400
