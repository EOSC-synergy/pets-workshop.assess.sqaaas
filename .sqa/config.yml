        - /usr/bin/env sh .sqa/script.gamy-viridian-gerbil.sh
        container: qc.sty_blurry-tan-hedgehog
      github.com/github-samples/pets-workshop jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.wheezy-cornflower-emu.sh
        container: qc.sty_snazzy-teal-beetle
