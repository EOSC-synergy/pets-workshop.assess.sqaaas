config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/github-samples/pets-workshop:
      branch: main
      repo: https://github.com/github-samples/pets-workshop
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.grumpy-brown-swan.sh
        container: qc.acc_gimpy-lavender-donkey
  QC.Doc:
    repos:
      github.com/github-samples/pets-workshop find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.freaky-gold-bongo.sh
        container: qc.doc_beady-alizarin-javanese
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.geeky-rose-malamute.sh
        container: qc.doc_beady-asparagus-ibis
      github.com/github-samples/pets-workshop markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.sleepy-platinum-quokka.sh
        container: qc.doc_freaky-green-russel
  QC.Lic:
    repos:
      github.com/github-samples/pets-workshop licensee:
        commands:
        - /usr/bin/env sh .sqa/script.woozy-magnolia-horse.sh
        container: qc.lic_gloppy-pumpkin-olm
  QC.Sec:
    repos:
      github.com/github-samples/pets-workshop bandit:
        commands:
        - /usr/bin/env sh .sqa/script.craggy-mustard-warthog.sh
        container: qc.sec_stinky-thistle-crab
  QC.Sty:
    repos:
      github.com/github-samples/pets-workshop flake8:
        commands:
        - /usr/bin/env sh .sqa/script.snappy-ruby-cheetah.sh
        container: qc.sty_silly-goldenrod-wolfhound
      github.com/github-samples/pets-workshop hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.scanty-viridian-gerbil.sh
        container: qc.sty_frumpy-zucchini-sparrow
      github.com/github-samples/pets-workshop jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.skimpy-cornflower-quokka.sh
        container: qc.sty_surly-chestnut-buzzard
  QC.Uni:
    repos:
      github.com/github-samples/pets-workshop pytest:
        commands:
        - /usr/bin/env sh .sqa/script.messy-pear-lionfish.sh
        container: qc.uni_cranky-aquamarine-dodo
  QC.Ver:
    repos:
      github.com/github-samples/pets-workshop get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-gold-spoonbill.sh
        container: qc.ver_pretty-cobalt-antelope
timeout: 5400
