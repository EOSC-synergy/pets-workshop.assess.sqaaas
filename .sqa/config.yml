config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/github-samples/pets-workshop:
      branch: main
      repo: https://github.com/github-samples/pets-workshop
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.flimsy-plum-gopher.sh
        container: qc.acc_woozy-malachite-slug
  QC.Doc:
    repos:
      github.com/github-samples/pets-workshop find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.sickly-ivory-chinook.sh
        container: qc.doc_jumpy-ultramarine-toucan
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.scaly-dandelion-lynx.sh
        container: qc.doc_pasty-orchid-insect
      github.com/github-samples/pets-workshop markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.geeky-aqua-kingfisher.sh
        container: qc.doc_shaky-amethyst-peccary
  QC.Lic:
    repos:
      github.com/github-samples/pets-workshop licensee:
        commands:
        - /usr/bin/env sh .sqa/script.baggy-razzmatazz-chinchilla.sh
        container: qc.lic_homey-turquoise-collie
  QC.Sec:
    repos:
      github.com/github-samples/pets-workshop bandit:
        commands:
        - /usr/bin/env sh .sqa/script.cheeky-gamboge-spider.sh
        container: qc.sec_geeky-myrtle-millipede
  QC.Sty:
    repos:
      github.com/github-samples/pets-workshop flake8:
        commands:
        - /usr/bin/env sh .sqa/script.flaky-mauve-zebra.sh
        container: qc.sty_silly-cyan-hippopotamus
      github.com/github-samples/pets-workshop hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.flaky-green-chinchilla.sh
        container: qc.sty_trippy-black-akbash
      github.com/github-samples/pets-workshop jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.pretty-khaki-eel.sh
        container: qc.sty_wheezy-purple-shrew
  QC.Uni:
    repos:
      github.com/github-samples/pets-workshop pytest:
        commands:
        - /usr/bin/env sh .sqa/script.sunny-olivine-alligator.sh
        container: qc.uni_gamy-grey-swan
  QC.Ver:
    repos:
      github.com/github-samples/pets-workshop get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.cloudy-chartreuse-flamingo.sh
        container: qc.ver_tacky-aquamarine-barnacle
timeout: 5400
