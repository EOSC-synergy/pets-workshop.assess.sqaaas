config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/github-samples/pets-workshop:
      branch: main
      repo: https://github.com/github-samples/pets-workshop
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.slimy-emerald-iguana.sh
        container: qc.acc_snoopy-wisteria-beagle
  QC.Doc:
    repos:
      github.com/github-samples/pets-workshop find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.whiny-chestnut-collie.sh
        container: qc.doc_slimy-cerulean-giraffe
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.surly-copper-frog.sh
        container: qc.doc_lanky-teal-tiger
      github.com/github-samples/pets-workshop markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.seedy-russet-mongoose.sh
        container: qc.doc_thirsty-emerald-hare
  QC.Lic:
    repos:
      github.com/github-samples/pets-workshop licensee:
        commands:
        - /usr/bin/env sh .sqa/script.surly-razzmatazz-tarantula.sh
        container: qc.lic_slaphappy-tangerine-frog
  QC.Sec:
    repos:
      github.com/github-samples/pets-workshop bandit:
        commands:
        - /usr/bin/env sh .sqa/script.shabby-persimmon-wallaby.sh
        container: qc.sec_silly-cardinal-rabbit
  QC.Sty:
    repos:
      github.com/github-samples/pets-workshop flake8:
        commands:
        - /usr/bin/env sh .sqa/script.hilly-thistle-fish.sh
        container: qc.sty_squeaky-vermilion-worm
      github.com/github-samples/pets-workshop hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.crappy-xanthic-echidna.sh
        container: qc.sty_leaky-indigo-guppy
      github.com/github-samples/pets-workshop jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.sleepy-amaranth-cheetah.sh
        container: qc.sty_shabby-alizarin-binturong
  QC.Uni:
    repos:
      github.com/github-samples/pets-workshop pytest:
        commands:
        - /usr/bin/env sh .sqa/script.sunny-beige-avocet.sh
        container: qc.uni_nippy-cardinal-nightingale
  QC.Ver:
    repos:
      github.com/github-samples/pets-workshop get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.paltry-beige-beagle.sh
        container: qc.ver_gamy-denim-opossum
timeout: 5400
