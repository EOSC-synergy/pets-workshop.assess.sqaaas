config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/github-samples/pets-workshop:
      branch: main
      repo: https://github.com/github-samples/pets-workshop
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.gamy-coral-weasel.sh
        container: qc.acc_seedy-firebrick-mouse
  QC.Doc:
    repos:
      github.com/github-samples/pets-workshop find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.skimpy-cerulean-turkey.sh
        container: qc.doc_scanty-cerulean-zorse
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.flabby-harlequin-squirrel.sh
        container: qc.doc_grumpy-green-chameleon
      github.com/github-samples/pets-workshop markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.tacky-zucchini-okapi.sh
        container: qc.doc_surly-zucchini-worm
  QC.Lic:
    repos:
      github.com/github-samples/pets-workshop licensee:
        commands:
        - /usr/bin/env sh .sqa/script.flimsy-cyan-booby.sh
        container: qc.lic_crappy-coral-macaw
  QC.Sec:
    repos:
      github.com/github-samples/pets-workshop bandit:
        commands:
        - /usr/bin/env sh .sqa/script.chewy-khaki-havanese.sh
        container: qc.sec_frumpy-azure-heron
  QC.Sty:
    repos:
      github.com/github-samples/pets-workshop flake8:
        commands:
        - /usr/bin/env sh .sqa/script.sleazy-maroon-bat.sh
        container: qc.sty_craggy-champagne-fowl
      github.com/github-samples/pets-workshop hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.whiny-celadon-clam.sh
        container: qc.sty_boozy-aquamarine-opossum
      github.com/github-samples/pets-workshop jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.tacky-buff-chinook.sh
        container: qc.sty_bumpy-cream-gharial
  QC.Uni:
    repos:
      github.com/github-samples/pets-workshop pytest:
        commands:
        - /usr/bin/env sh .sqa/script.smelly-teal-whale.sh
        container: qc.uni_foggy-jade-nightingale
  QC.Ver:
    repos:
      github.com/github-samples/pets-workshop get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.skanky-jade-deer.sh
        container: qc.ver_baggy-myrtle-ray
timeout: 5400
