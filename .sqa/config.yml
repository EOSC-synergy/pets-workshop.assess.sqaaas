config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/github-samples/pets-workshop:
      branch: main
      repo: https://github.com/github-samples/pets-workshop
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.bluesy-periwinkle-chinchilla.sh
        container: qc.acc_squeaky-tan-bee
  QC.Doc:
    repos:
      github.com/github-samples/pets-workshop find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.lovely-wheat-magpie.sh
        container: qc.doc_hilly-amethyst-lobster
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.homey-olivine-bandicoot.sh
        container: qc.doc_trippy-buff-vole
      github.com/github-samples/pets-workshop markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.sunny-ruby-uguisu.sh
        container: qc.doc_whiny-thistle-shrimp
  QC.Lic:
    repos:
      github.com/github-samples/pets-workshop licensee:
        commands:
        - /usr/bin/env sh .sqa/script.ugly-linen-wolverine.sh
        container: qc.lic_frumpy-champagne-tzu
  QC.Sec:
    repos:
      github.com/github-samples/pets-workshop bandit:
        commands:
        - /usr/bin/env sh .sqa/script.tasty-blue-worm.sh
        container: qc.sec_craggy-orange-gopher
  QC.Sty:
    repos:
      github.com/github-samples/pets-workshop flake8:
        commands:
        - /usr/bin/env sh .sqa/script.goopy-lime-sparrow.sh
        container: qc.sty_tasty-tangerine-bloodhound
      github.com/github-samples/pets-workshop hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.wimpy-asparagus-toad.sh
        container: qc.sty_baggy-peach-seal
      github.com/github-samples/pets-workshop jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.pasty-periwinkle-ant.sh
        container: qc.sty_clammy-apricot-buffalo
  QC.Uni:
    repos:
      github.com/github-samples/pets-workshop pytest:
        commands:
        - /usr/bin/env sh .sqa/script.scanty-wheat-ostrich.sh
        container: qc.uni_sunny-ecru-falcon
  QC.Ver:
    repos:
      github.com/github-samples/pets-workshop get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.grumpy-amethyst-urchin.sh
        container: qc.ver_skanky-pumpkin-weasel
timeout: 5400
