config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/github-samples/pets-workshop:
      branch: main
      repo: https://github.com/github-samples/pets-workshop
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.sloppy-goldenrod-corgi.sh
        container: qc.acc_skimpy-maroon-tzu
  QC.Doc:
    repos:
      github.com/github-samples/pets-workshop find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.homey-xanthic-llama.sh
        container: qc.doc_boozy-taupe-avocet
      github.com/github-samples/pets-workshop git:
        commands:
        - /usr/bin/env sh .sqa/script.smelly-white-bombay.sh
        container: qc.doc_leaky-indigo-cattle
      github.com/github-samples/pets-workshop markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.snappy-eggplant-horse.sh
        container: qc.doc_lanky-corn-wolfhound
  QC.Lic:
    repos:
      github.com/github-samples/pets-workshop licensee:
        commands:
        - /usr/bin/env sh .sqa/script.sleepy-alizarin-burmese.sh
        container: qc.lic_skanky-aqua-hyrax
